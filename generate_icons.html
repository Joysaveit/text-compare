<!DOCTYPE html>
<html>
<head>
    <title>生成Chrome扩展图标</title>
</head>
<body>
    <h1>Chrome扩展图标生成器</h1>
    <p>点击下面的按钮来生成不同尺寸的图标：</p>
    
    <div id="iconContainer">
        <canvas id="icon16" width="16" height="16"></canvas>
        <canvas id="icon32" width="32" height="32"></canvas>
        <canvas id="icon48" width="48" height="48"></canvas>
        <canvas id="icon128" width="128" height="128"></canvas>
    </div>
    
    <div style="margin-top: 20px;">
        <button onclick="generateIcons()">生成所有图标</button>
        <button onclick="downloadAll()">下载所有图标</button>
    </div>

    <script>
        function drawIcon(canvas, size) {
            const ctx = canvas.getContext('2d');
            const scale = size / 128;
            
            // 背景
            ctx.fillStyle = '#2196F3';
            ctx.beginPath();
            ctx.roundRect(0, 0, size, size, size * 0.125);
            ctx.fill();
            
            // 绘制对比箭头
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.0625;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            // 上箭头
            ctx.beginPath();
            ctx.moveTo(size * 0.25, size * 0.3125);
            ctx.lineTo(size * 0.5, size * 0.5625);
            ctx.lineTo(size * 0.75, size * 0.3125);
            ctx.stroke();
            
            // 下箭头
            ctx.beginPath();
            ctx.moveTo(size * 0.25, size * 0.6875);
            ctx.lineTo(size * 0.5, size * 0.4375);
            ctx.lineTo(size * 0.75, size * 0.6875);
            ctx.stroke();
            
            // 中心点
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(size * 0.5, size * 0.5, size * 0.0625, 0, 2 * Math.PI);
            ctx.fill();
        }
        
        function generateIcons() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`icon${size}`);
                drawIcon(canvas, size);
            });
        }
        
        function downloadAll() {
            const sizes = [16, 32, 48, 128];
            sizes.forEach(size => {
                const canvas = document.getElementById(`icon${size}`);
                const link = document.createElement('a');
                link.download = `icon${size}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
        
        // 页面加载时自动生成图标
        window.onload = function() {
            generateIcons();
        };
    </script>
    
    <style>
        #iconContainer {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        canvas {
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #1976D2;
        }
    </style>
</body>
</html>
